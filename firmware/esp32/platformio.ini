; ESP32 family BLE gateway — proximity events over HTTP
;
; IMPORTANT: Match flash size / PSRAM to your *physical* module.
; - Waveshare ESP32-S3 Mini / S3-Tiny (ESP32-S3FH4R2): usually 4 MB flash + 2 MB PSRAM → env **waveshare_s3_mini**
; - Espressif ESP32-S3-DevKitC-1 N8: 8 MB flash, no PSRAM → env **esp32-s3-devkitc-1**
;
; Using an 8 MB partition map on a 4 MB chip (or wrong PSRAM mode) causes boot loops / odd serial / “corruption” errors.

[platformio]
default_envs = waveshare_s3_mini

; --- Waveshare ESP32-S3 Mini / S3-Tiny (4 MB flash; PSRAM via board preset) ---
; `lolin_s3_mini` = 4 MB + PSRAM with **qio_qspi** (quad SPI PSRAM). Do **not** force `qio_opi` unless the
; module datasheet says octal/OPI PSRAM — OPI mode causes: "PSRAM ID read error" / "SPI RAM ... initialization failed".
[env:waveshare_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_rts = 0
monitor_dtr = 0
board_upload.flash_size = 4MB
board_build.partitions = partitions_4MB_no_coredump.csv
; Board preset sets flash + PSRAM mode (`qio_qspi`). Only set `board_build.arduino.memory_type` if you match the datasheet.
build_flags =
  -DCORE_DEBUG_LEVEL=0
  ; Single USB-C on many mini boards — serial over CDC. Comment out if you use an external USB–UART on TX/RX only.
  -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  h2zero/NimBLE-Arduino@^1.4.2
  bblanchon/ArduinoJson@^7.0.4
  tzapu/WiFiManager@^2.0.17

; --- Espressif DevKitC-1 N8 (8 MB, no PSRAM) ---
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_rts = 0
monitor_dtr = 0
board_upload.flash_size = 8MB
board_build.partitions = partitions_8MB_no_coredump.csv
build_flags =
  -DCORE_DEBUG_LEVEL=0
lib_deps =
  h2zero/NimBLE-Arduino@^1.4.2
  bblanchon/ArduinoJson@^7.0.4
  tzapu/WiFiManager@^2.0.17

; upload_speed = 115200  ; if 460800 is unreliable
; board_build.flash_mode = dio  ; rare flash-chip compatibility fallback
