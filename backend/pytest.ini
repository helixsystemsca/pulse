[pytest]
asyncio_mode = auto
# Global AsyncEngine (`app.core.database`) is created at import; asyncpg must use one event loop for the
# whole session. "function" loop scope causes "attached to a different loop" failures after the first test.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: requires PostgreSQL test database (set TEST_DATABASE_URL)
