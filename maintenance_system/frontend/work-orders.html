<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Work orders</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Maintenance System</h1>
      <nav>
        <a href="index.html">Dashboard</a>
        <a href="request.html">Request</a>
        <a href="work-orders.html" class="active">Work orders</a>
        <a href="pm.html">PM</a>
        <a href="assets.html">Assets</a>
      </nav>
    </header>
    <main>
      <h2>Work orders</h2>
      <p class="muted">
        <label>Status <select id="st"><option value="">Any</option></select></label>
        <label style="margin-left: 1rem"
          >Search <input id="q" placeholder="title, number…" style="max-width: 220px"
        /></label>
        <button type="button" id="go" class="secondary" style="margin-left: 0.5rem">Apply</button>
      </p>
      <table>
        <thead>
          <tr>
            <th>Number</th>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <p class="error" id="err"></p>
    </main>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
      if (!Maint.requireAuth()) {
      } else {
      const statuses = ["open", "in_progress", "on_hold", "completed", "closed"];
      const sel = document.getElementById("st");
      statuses.forEach((s) => {
        const o = document.createElement("option");
        o.value = s;
        o.textContent = s.replace("_", " ");
        sel.appendChild(o);
      });

      async function load() {
        document.getElementById("err").textContent = "";
        const st = document.getElementById("st").value;
        const q = document.getElementById("q").value.trim();
        const qs = new URLSearchParams();
        if (st) qs.set("status_filter", st);
        if (q) qs.set("q", q);
        const list = await Maint.api("/work-orders?" + qs.toString());
        const tb = document.getElementById("rows");
        tb.innerHTML = "";
        list.forEach((wo) => {
          const tr = document.createElement("tr");
          const pri = wo.priority || "";
          tr.innerHTML =
            "<td>" +
            wo.work_order_number +
            "</td><td>" +
            wo.title +
            "</td><td><span class=badge>" +
            wo.status +
            "</span></td><td><span class='badge " +
            pri +
            "'>" +
            pri +
            "</span></td><td><a href=\"work-order.html?id=" +
            wo.id +
            '">View</a></td>';
          tb.appendChild(tr);
        });
      }
      document.getElementById("go").onclick = load;
      load();
      }
    </script>
  </body>
</html>
