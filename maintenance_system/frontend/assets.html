<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assets</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Maintenance System</h1>
      <nav>
        <a href="index.html">Dashboard</a>
        <a href="request.html">Request</a>
        <a href="work-orders.html">Work orders</a>
        <a href="pm.html">PM</a>
        <a href="assets.html" class="active">Assets</a>
      </nav>
    </header>
    <main>
      <h2>Asset registry</h2>
      <p class="muted">
        <label>Search <input id="q" /> <button type="button" class="secondary" id="go">Search</button></label>
      </p>
      <table>
        <thead>
          <tr>
            <th>External ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Location</th>
            <th>UUID (for forms)</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <p class="error" id="err"></p>
      <h3>Create asset (manager+)</h3>
      <label>External ID <input id="ex" /></label>
      <label>Name <input id="nm" /></label>
      <label>Type <input id="ty" value="equipment" /></label>
      <label>Location <input id="loc" /></label>
      <button type="button" id="create">Create</button>
    </main>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
      if (!Maint.requireAuth()) {
      } else {
      async function load() {
        document.getElementById("err").textContent = "";
        const qs = new URLSearchParams();
        const q = document.getElementById("q").value.trim();
        if (q) qs.set("q", q);
        const list = await Maint.api("/assets?" + qs.toString());
        const tb = document.getElementById("rows");
        tb.innerHTML = "";
        list.forEach((a) => {
          const tr = document.createElement("tr");
          tr.innerHTML =
            "<td>" +
            a.external_id +
            "</td><td>" +
            a.name +
            "</td><td>" +
            a.asset_type +
            "</td><td>" +
            a.location +
            "</td><td class=muted>" +
            a.id +
            "</td>";
          tb.appendChild(tr);
        });
      }
      document.getElementById("go").onclick = load;
      document.getElementById("create").onclick = async () => {
        document.getElementById("err").textContent = "";
        try {
          await Maint.api("/assets", {
            method: "POST",
            body: JSON.stringify({
              external_id: document.getElementById("ex").value,
              name: document.getElementById("nm").value,
              asset_type: document.getElementById("ty").value,
              location: document.getElementById("loc").value,
            }),
          });
          await load();
        } catch (e) {
          document.getElementById("err").textContent = e.message;
        }
      };
      load().catch((e) => (document.getElementById("err").textContent = e.message));
      }
    </script>
  </body>
</html>
