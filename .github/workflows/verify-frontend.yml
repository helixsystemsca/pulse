# Catches broken Next.js builds before they land on main (same command Vercel runs).
# Pair with Vercel “Production Branch: main” + Root Directory: frontend.
name: Verify frontend
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/verify-frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/verify-frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build (production)
        env:
          SKIP_BUILD_VERSION_BUMP: "1"
        run: npm run build
